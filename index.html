<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome – MOBEK MEDIA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* (unchanged CSS styles) */
  </style>
  <!-- Tracking Script -->
  <script async src="https://script.google.com/macros/s/AKfycbzjQPqBJT4bv0l4Jgh5HvnuToSqiQmF3pdsmclqvlV9eXnVlmF6niWTuZpsSS_Mc4eL/exec"></script>
</head>
<body>
  <!-- Decorative elements -->
  <div class="decorative-element top-left"></div>
  <div class="decorative-element bottom-right"></div>  <!-- Agency header -->  <header class="agency-header">
    <img src="" alt="MOBEK MEDIA Logo" class="agency-logo">
    <div class="agency-name">MOBEK MEDIA</div>
  </header>  <h1>👋 Welcome to <span class="brand">MOBEK MEDIA</span>!</h1>
  <p class="subtitle">Your partner in transforming kitchen businesses with high-performing digital advertising</p>  <div class="step-indicator">
    <div class="step-dot active"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>  <!-- Content cards (unchanged) -->  <div class="btn-container">
    <a href="access.html" class="btn">Get Started Now →</a>
  </div>  <!-- Floating chat button -->  <div class="chat-floating">
    <button class="chat-button" id="chatButton">
      <i class="fas fa-comment-dots"></i>
    </button>
  </div>  <!-- Tawk.to Live Chat Integration (Updated ID) -->  <script type="text/javascript">
    var Tawk_API = Tawk_API || {}, Tawk_LoadStart = new Date();
    (function(){
      var s1 = document.createElement("script"), s0 = document.getElementsByTagName("script")[0];
      s1.async = true;
      s1.src = 'https://embed.tawk.to/688f950a8ba539192ec9c8c9/1j1odsd19';
      s1.charset = 'UTF-8';
      s1.setAttribute('crossorigin','*');
      s0.parentNode.insertBefore(s1, s0);
    })();

    function checkTawkReady() {
      if (window.Tawk_API && window.Tawk_API.toggle) {
        document.getElementById('chatButton').addEventListener('click', function() {
          Tawk_API.toggle();
        });
      } else {
        setTimeout(checkTawkReady, 500);
      }
    }

    window.addEventListener('DOMContentLoaded', function() {
      checkTawkReady();
      setTimeout(function() {
        if (!window.Tawk_API || !window.Tawk_API.toggle) {
          document.getElementById('chatButton').addEventListener('click', function() {
            window.open('https://tawk.to/chat/688f950a8ba539192ec9c8c9/1j1odsd19', '_blank');
          });
        }
      }, 5000);
    });

    document.getElementById('chatButton').addEventListener('contextmenu', function(e) {
      e.preventDefault();
      if (window.Tawk_API && window.Tawk_API.toggle) {
        alert('Tawk.to chat is ready and working properly!');
      } else {
        alert('Tawk.to is still loading or not available. Please wait or refresh the page.');
      }
    });
  </script>  <noscript>
    <style>
      .chat-floating { display: none !important; }
    </style>
    <div class="nojs-warning" style="position:fixed; bottom:20px; right:20px; background:#ff4444; color:white; padding:10px; border-radius:5px; z-index:9999;">
      Please enable JavaScript for live chat support.
    </div>
  </noscript>
</body>
</html>
